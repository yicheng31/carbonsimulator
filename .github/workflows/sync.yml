name: Weekly Carbon Data Sync

on:
  schedule:
    - cron: '0 0 * * 1' # 每週一凌晨 00:00 執行
  workflow_dispatch:      # 允許手動點擊按鈕觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v3

      - name: 設定 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: pip install requests

      - name: 執行抓取程式
        env:
          MOENV_API_KEY: ${{ secrets.MOENV_API_KEY }}
        run: python update_carbon_data.py

      - name: 將更新後的資料推送到 Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add carbon_data.json
          git commit -m "自動更新碳排放係數資料庫" || exit 0
          git push
