name: Auto Update Carbon Data
on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 12 點自動執行一次
  workflow_dispatch:      # 允許你手動按按鈕執行

jobs:
  update_json:
    runs-on: ubuntu-latest
    steps:
      - name: 複製程式碼
        uses: actions/checkout@v3

      - name: 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝依賴套件
        run: pip install -r requirements.txt

      - name: 執行抓取與 AI 處理
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 這裡會用到你存好的 Secret
        run: python fetch_data.py

      - name: 將變更推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "Update carbon data: $(date)" || exit 0
          git push
      - name: Update SSL certificates
        run: |
          python -m pip install --upgrade certifi
          python -c "import certifi; print(certifi.where())"
